services:
  db:
    image: supabase/postgres:15.8.1.085
    container_name: supabase_db
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      JWT_EXP: "3600"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init/00-realtime-bootstrap.sql:/docker-entrypoint-initdb.d/00-realtime-bootstrap.sql:ro

  rest:
    image: postgrest/postgrest:v14.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54321:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long

  realtime:
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54324:4000"
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: supabaserealtime1
      API_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      METRICS_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      APP_NAME: realtime
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
      RLIMIT_NOFILE: "10000"

  meta:
    image: supabase/postgres-meta:v0.96.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54325:8080"
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: postgres
      CRYPTO_KEY: 0123456789abcdef0123456789abcdef

  studio:
    image: supabase/studio:2026.04.27-sha-5f60601
    restart: unless-stopped
    depends_on:
      - meta
      - rest
    ports:
      - "54323:3000"
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
      PG_META_CRYPTO_KEY: 0123456789abcdef0123456789abcdef
      DEFAULT_ORGANIZATION_NAME: Local
      DEFAULT_PROJECT_NAME: Buzzer
      SUPABASE_URL: http://localhost:54321
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiaWF0IjoxNzc3OTcxNTA5LCJleHAiOjE4MDk1MDc1MDl9.qG8ROv2NimgF60YQzWEEiO8IlvZ_RNrzg81JGCbIesM
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtbG9jYWwiLCJpYXQiOjE3Nzc5NzE1MDksImV4cCI6MTgwOTUwNzUwOX0.0NSL2Ckgp26azx6lVmU0upwLeQYel94B82y1R7ZqOXA
      AUTH_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long

volumes:
  db_data:
